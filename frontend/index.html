<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Calendar Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🎙️ Voice Calendar Assistant</h1>
    <p class="subtitle">Speak to add events to your calendar</p>

    <div class="btn-row">
      <button id="micBtn">🎤 Start Listening</button>
      <button id="viewEventsBtn">📅 My Events</button>
    </div>

    <div id="status">Click the button and speak...</div>
    <div id="transcript"></div>

    <div id="durationSection" style="display:none;">
      <p class="duration-label">Select event duration:</p>
      <div class="duration-buttons">
        <button class="dur-btn" data-minutes="15">15 min</button>
        <button class="dur-btn" data-minutes="30">30 min</button>
        <button class="dur-btn" data-minutes="60">1 hour</button>
        <button class="dur-btn" data-minutes="120">2 hours</button>
      </div>
      <div class="custom-duration">
        <input type="number" id="customMinutes" placeholder="Custom (minutes)" min="1" max="480" />
        <button id="customBtn">Set</button>
      </div>
    </div>

    <div id="result"></div>

    <div id="eventsSection" style="display:none;">
      <h2 class="events-title">📋 Upcoming Events</h2>
      <div id="eventsList"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
